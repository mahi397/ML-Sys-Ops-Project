services:
  jitsi_transcript_receiver:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      INGEST_TOKEN: ${INGEST_TOKEN:-}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      JITSI_SAVE_DIR: /mnt/block/user-behaviour/received_transcripts
      JITSI_LOG_DIR: /mnt/block/ingest_logs/jitsi_transcript
      JITSI_BUILD_STAGE1_AFTER_INGEST: ${JITSI_BUILD_STAGE1_AFTER_INGEST:-false}
      JITSI_STAGE1_OUTPUT_ROOT: /mnt/block/user-behaviour/inference_requests/stage1
      JITSI_STAGE1_WINDOW_SIZE: ${JITSI_STAGE1_WINDOW_SIZE:-7}
      JITSI_STAGE1_TRANSITION_INDEX: ${JITSI_STAGE1_TRANSITION_INDEX:-3}
      JITSI_STAGE1_MIN_UTTERANCE_CHARS: ${JITSI_STAGE1_MIN_UTTERANCE_CHARS:-20}
      JITSI_STAGE1_MAX_WORDS_PER_UTTERANCE: ${JITSI_STAGE1_MAX_WORDS_PER_UTTERANCE:-50}
      JITSI_STAGE1_MIN_INFERENCE_UTTERANCES: ${JITSI_STAGE1_MIN_INFERENCE_UTTERANCES:-2}
      JITSI_STAGE1_SHORT_MEETING_MAX_UTTERANCES: ${JITSI_STAGE1_SHORT_MEETING_MAX_UTTERANCES:-6}
      JITSI_UPLOAD_STAGE1_ARTIFACTS: ${JITSI_UPLOAD_STAGE1_ARTIFACTS:-true}
      JITSI_STAGE1_OBJECT_PREFIX: ${JITSI_STAGE1_OBJECT_PREFIX:-production/inference_requests/stage1}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    ports:
      - "9000:9000"
    volumes:
      - /mnt/block/user-behaviour/received_transcripts:/mnt/block/user-behaviour/received_transcripts
      - /mnt/block/user-behaviour/parsed_transcripts:/mnt/block/user-behaviour/parsed_transcripts
      - /mnt/block/user-behaviour/inference_requests/stage1:/mnt/block/user-behaviour/inference_requests/stage1
      - /mnt/block/ingest_logs/jitsi_transcript:/mnt/block/ingest_logs/jitsi_transcript
      - ${HOME}/.config/rclone:/config/rclone:ro
    networks:
      - proj07_shared

  db_task_worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      DB_TASK_LOG_DIR: /mnt/block/ingest_logs/db_task_worker
      DB_TASK_POLL_INTERVAL_SECONDS: ${DB_TASK_POLL_INTERVAL_SECONDS:-5}
      DB_TASK_FULL_SCAN_INTERVAL_SECONDS: ${DB_TASK_FULL_SCAN_INTERVAL_SECONDS:-300}
      DB_TASK_BATCH_SIZE: ${DB_TASK_BATCH_SIZE:-25}
      DB_TASK_FULL_SCAN_LIMIT: ${DB_TASK_FULL_SCAN_LIMIT:-0}
      DB_TASK_STAGE1_BUILD_ENABLED: ${DB_TASK_STAGE1_BUILD_ENABLED:-true}
      DB_TASK_STAGE1_FORWARD_ENABLED: ${DB_TASK_STAGE1_FORWARD_ENABLED:-true}
      DB_TASK_STAGE2_BUILD_ENABLED: ${DB_TASK_STAGE2_BUILD_ENABLED:-true}
      DB_TASK_STAGE2_FORWARD_ENABLED: ${DB_TASK_STAGE2_FORWARD_ENABLED:-true}
      DB_TASK_USER_SUMMARY_ENABLED: ${DB_TASK_USER_SUMMARY_ENABLED:-true}
      STAGE1_ARTIFACT_VERSION: ${STAGE1_ARTIFACT_VERSION:-1}
      STAGE1_BUILD_MAX_ATTEMPTS: ${STAGE1_BUILD_MAX_ATTEMPTS:-8}
      STAGE1_FORWARD_MAX_ATTEMPTS: ${STAGE1_FORWARD_MAX_ATTEMPTS:-8}
      STAGE2_BUILD_MAX_ATTEMPTS: ${STAGE2_BUILD_MAX_ATTEMPTS:-8}
      STAGE2_FORWARD_MAX_ATTEMPTS: ${STAGE2_FORWARD_MAX_ATTEMPTS:-8}
      USER_SUMMARY_MATERIALIZE_MAX_ATTEMPTS: ${USER_SUMMARY_MATERIALIZE_MAX_ATTEMPTS:-8}
      WORKFLOW_TASK_STALE_AFTER_SECONDS: ${WORKFLOW_TASK_STALE_AFTER_SECONDS:-600}
    command: ["python", "-m", "proj07_services.workers.db_task_worker"]
    volumes:
      - /mnt/block/ingest_logs/db_task_worker:/mnt/block/ingest_logs/db_task_worker
    networks:
      - proj07_shared

  stage1_payload_service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      STAGE1_BUILD_WORKER_LOG_DIR: /mnt/block/ingest_logs/stage1_payload_service
      STAGE1_BUILD_WORKER_POLL_INTERVAL_SECONDS: ${STAGE1_BUILD_WORKER_POLL_INTERVAL_SECONDS:-5}
      STAGE1_OUTPUT_ROOT: /mnt/block/user-behaviour/inference_requests/stage1
      STAGE1_WINDOW_SIZE: ${STAGE1_WINDOW_SIZE:-7}
      STAGE1_TRANSITION_INDEX: ${STAGE1_TRANSITION_INDEX:-3}
      STAGE1_MIN_UTTERANCE_CHARS: ${STAGE1_MIN_UTTERANCE_CHARS:-20}
      STAGE1_MAX_WORDS_PER_UTTERANCE: ${STAGE1_MAX_WORDS_PER_UTTERANCE:-50}
      STAGE1_MIN_INFERENCE_UTTERANCES: ${STAGE1_MIN_INFERENCE_UTTERANCES:-2}
      STAGE1_SHORT_MEETING_MAX_UTTERANCES: ${STAGE1_SHORT_MEETING_MAX_UTTERANCES:-6}
      STAGE1_UPLOAD_ARTIFACTS: ${STAGE1_UPLOAD_ARTIFACTS:-true}
      STAGE1_OBJECT_PREFIX: ${STAGE1_OBJECT_PREFIX:-production/inference_requests/stage1}
      STAGE1_ARTIFACT_VERSION: ${STAGE1_ARTIFACT_VERSION:-1}
      STAGE1_BUILD_TIMEOUT_SECONDS: ${STAGE1_BUILD_TIMEOUT_SECONDS:-300}
      STAGE1_FORWARD_MAX_ATTEMPTS: ${STAGE1_FORWARD_MAX_ATTEMPTS:-8}
      WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS: ${WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_BASE_SECONDS: ${WORKFLOW_TASK_BACKOFF_BASE_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_MAX_SECONDS: ${WORKFLOW_TASK_BACKOFF_MAX_SECONDS:-900}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    command: ["python", "-m", "proj07_services.workers.stage1_payload_service"]
    volumes:
      - /mnt/block/user-behaviour/inference_requests/stage1:/mnt/block/user-behaviour/inference_requests/stage1
      - /mnt/block/ingest_logs/stage1_payload_service:/mnt/block/ingest_logs/stage1_payload_service
      - ${HOME}/.config/rclone:/config/rclone:ro
    networks:
      - proj07_shared

  stage1_forward_service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      STAGE1_FORWARD_WORKER_LOG_DIR: /mnt/block/ingest_logs/stage1_forward_service
      STAGE1_FORWARD_WORKER_POLL_INTERVAL_SECONDS: ${STAGE1_FORWARD_WORKER_POLL_INTERVAL_SECONDS:-5}
      STAGE1_OUTPUT_ROOT: /mnt/block/user-behaviour/inference_requests/stage1
      STAGE1_RESPONSE_ROOT: /mnt/block/user-behaviour/inference_responses/stage1
      STAGE1_ARTIFACT_VERSION: ${STAGE1_ARTIFACT_VERSION:-1}
      STAGE1_FORWARD_URL: ${STAGE1_FORWARD_URL:-http://192.5.86.194:8000/segment}
      STAGE1_FORWARD_PAYLOAD_FORMAT: ${STAGE1_FORWARD_PAYLOAD_FORMAT:-requests_json}
      STAGE1_FORWARD_TIMEOUT_SECONDS: ${STAGE1_FORWARD_TIMEOUT_SECONDS:-300}
      STAGE1_RESPONSE_PREFIX: ${STAGE1_RESPONSE_PREFIX:-production/inference_responses/stage1}
      STAGE1_FORWARD_UPLOAD_ARTIFACTS: ${STAGE1_FORWARD_UPLOAD_ARTIFACTS:-true}
      STAGE2_BUILD_MAX_ATTEMPTS: ${STAGE2_BUILD_MAX_ATTEMPTS:-8}
      WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS: ${WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_BASE_SECONDS: ${WORKFLOW_TASK_BACKOFF_BASE_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_MAX_SECONDS: ${WORKFLOW_TASK_BACKOFF_MAX_SECONDS:-900}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    command: ["python", "-m", "proj07_services.workers.stage1_forward_service"]
    volumes:
      - /mnt/block/user-behaviour/inference_requests/stage1:/mnt/block/user-behaviour/inference_requests/stage1
      - /mnt/block/user-behaviour/inference_responses/stage1:/mnt/block/user-behaviour/inference_responses/stage1
      - /mnt/block/ingest_logs/stage1_forward_service:/mnt/block/ingest_logs/stage1_forward_service
      - ${HOME}/.config/rclone:/config/rclone:ro
    networks:
      - proj07_shared

  stage2_input_service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      STAGE2_BUILD_WORKER_LOG_DIR: /mnt/block/ingest_logs/stage2_input_service
      STAGE2_BUILD_WORKER_POLL_INTERVAL_SECONDS: ${STAGE2_BUILD_WORKER_POLL_INTERVAL_SECONDS:-5}
      STAGE1_OUTPUT_ROOT: /mnt/block/user-behaviour/inference_requests/stage1
      STAGE1_RESPONSE_ROOT: /mnt/block/user-behaviour/inference_responses/stage1
      STAGE2_INPUT_ROOT: /mnt/block/user-behaviour/inference_requests/stage2
      SEGMENTS_ROOT: /mnt/block/user-behaviour/reconstructed_segments
      STAGE2_BOUNDARY_THRESHOLD: ${STAGE2_BOUNDARY_THRESHOLD:-0.5}
      STAGE2_UPLOAD_ARTIFACTS: ${STAGE2_UPLOAD_ARTIFACTS:-true}
      STAGE2_OBJECT_PREFIX: ${STAGE2_OBJECT_PREFIX:-production/inference_requests/stage2}
      SEGMENTS_PREFIX: ${SEGMENTS_PREFIX:-production/reconstructed_segments}
      STAGE2_FORWARD_MAX_ATTEMPTS: ${STAGE2_FORWARD_MAX_ATTEMPTS:-8}
      WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS: ${WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_BASE_SECONDS: ${WORKFLOW_TASK_BACKOFF_BASE_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_MAX_SECONDS: ${WORKFLOW_TASK_BACKOFF_MAX_SECONDS:-900}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    command: ["python", "-m", "proj07_services.workers.stage2_input_service"]
    volumes:
      - /mnt/block/user-behaviour/inference_requests/stage1:/mnt/block/user-behaviour/inference_requests/stage1
      - /mnt/block/user-behaviour/inference_responses/stage1:/mnt/block/user-behaviour/inference_responses/stage1
      - /mnt/block/user-behaviour/inference_requests/stage2:/mnt/block/user-behaviour/inference_requests/stage2
      - /mnt/block/user-behaviour/reconstructed_segments:/mnt/block/user-behaviour/reconstructed_segments
      - /mnt/block/ingest_logs/stage2_input_service:/mnt/block/ingest_logs/stage2_input_service
      - ${HOME}/.config/rclone:/config/rclone:ro
    networks:
      - proj07_shared

  stage2_forward_service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      STAGE2_FORWARD_WORKER_LOG_DIR: /mnt/block/ingest_logs/stage2_forward_service
      STAGE2_FORWARD_WORKER_POLL_INTERVAL_SECONDS: ${STAGE2_FORWARD_WORKER_POLL_INTERVAL_SECONDS:-5}
      STAGE2_INPUT_ROOT: /mnt/block/user-behaviour/inference_requests/stage2
      STAGE2_RESPONSE_ROOT: /mnt/block/user-behaviour/inference_responses/stage2
      STAGE1_ARTIFACT_VERSION: ${STAGE1_ARTIFACT_VERSION:-1}
      STAGE2_FORWARD_URL: ${STAGE2_FORWARD_URL}
      STAGE2_FORWARD_PAYLOAD_FORMAT: ${STAGE2_FORWARD_PAYLOAD_FORMAT:-segment_json}
      STAGE2_FORWARD_TIMEOUT_SECONDS: ${STAGE2_FORWARD_TIMEOUT_SECONDS:-300}
      STAGE2_RESPONSE_PREFIX: ${STAGE2_RESPONSE_PREFIX:-production/inference_responses/stage2}
      STAGE2_MODEL_NAME: ${STAGE2_MODEL_NAME:-stage2-summarizer}
      STAGE2_MODEL_VERSION: ${STAGE2_MODEL_VERSION:-}
      STAGE2_PROMPT_VERSION: ${STAGE2_PROMPT_VERSION:-}
      STAGE2_FORWARD_UPLOAD_ARTIFACTS: ${STAGE2_FORWARD_UPLOAD_ARTIFACTS:-true}
      WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS: ${WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_BASE_SECONDS: ${WORKFLOW_TASK_BACKOFF_BASE_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_MAX_SECONDS: ${WORKFLOW_TASK_BACKOFF_MAX_SECONDS:-900}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    command: ["python", "-m", "proj07_services.workers.stage2_forward_service"]
    volumes:
      - /mnt/block/user-behaviour/inference_requests/stage2:/mnt/block/user-behaviour/inference_requests/stage2
      - /mnt/block/user-behaviour/inference_responses/stage2:/mnt/block/user-behaviour/inference_responses/stage2
      - /mnt/block/ingest_logs/stage2_forward_service:/mnt/block/ingest_logs/stage2_forward_service
      - ${HOME}/.config/rclone:/config/rclone:ro
    networks:
      - proj07_shared

  user_summary_materialize_service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      USER_SUMMARY_WORKER_LOG_DIR: /mnt/block/ingest_logs/user_summary_materialize_service
      USER_SUMMARY_WORKER_POLL_INTERVAL_SECONDS: ${USER_SUMMARY_WORKER_POLL_INTERVAL_SECONDS:-5}
      USER_SUMMARY_OUTPUT_ROOT: /mnt/block/user-behaviour/user_summary_edits
      USER_SUMMARY_OBJECT_PREFIX: ${USER_SUMMARY_OBJECT_PREFIX:-production/summary_edits}
      USER_SUMMARY_UPLOAD_ARTIFACTS: ${USER_SUMMARY_UPLOAD_ARTIFACTS:-true}
      WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS: ${WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_BASE_SECONDS: ${WORKFLOW_TASK_BACKOFF_BASE_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_MAX_SECONDS: ${WORKFLOW_TASK_BACKOFF_MAX_SECONDS:-900}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    command: ["python", "-m", "proj07_services.workers.user_summary_materialize_service"]
    volumes:
      - /mnt/block/user-behaviour/user_summary_edits:/mnt/block/user-behaviour/user_summary_edits
      - /mnt/block/ingest_logs/user_summary_materialize_service:/mnt/block/ingest_logs/user_summary_materialize_service
      - ${HOME}/.config/rclone:/config/rclone:ro
    networks:
      - proj07_shared

networks:
  proj07_shared:
    external: true