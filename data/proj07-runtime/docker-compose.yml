      PRODUCTION_DRIFT_MONITOR_MAX_WORDS_PER_UTTERANCE: ${PRODUCTION_DRIFT_MONITOR_MAX_WORDS_PER_UTTERANCE:-50}
      PRODUCTION_DRIFT_MONITOR_PSI_THRESHOLD: ${PRODUCTION_DRIFT_MONITOR_PSI_THRESHOLD:-0.2}
