services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-proj07_sql_db}
      POSTGRES_USER: ${POSTGRES_USER:-proj07_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proj07}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-/mnt/block/postgres-data}:/var/lib/postgresql/data
      - ../proj07-db/init_sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proj07_user} -d ${POSTGRES_DB:-proj07_sql_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4.8.1
    container_name: adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-5050}:8080"

  jitsi_transcript_receiver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jitsi_transcript_receiver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      INGEST_TOKEN: ${INGEST_TOKEN:-}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD:-proj07}@postgres:5432/${POSTGRES_DB:-proj07_sql_db}"
      JITSI_SAVE_DIR: /mnt/block/user-behaviour/received_transcripts
      JITSI_LOG_DIR: /mnt/block/ingest_logs/jitsi_transcript
      JITSI_BUILD_STAGE1_AFTER_INGEST: ${JITSI_BUILD_STAGE1_AFTER_INGEST:-false}
      JITSI_STAGE1_OUTPUT_ROOT: /mnt/block/user-behaviour/inference_requests/stage1
      JITSI_STAGE1_WINDOW_SIZE: ${JITSI_STAGE1_WINDOW_SIZE:-7}
      JITSI_STAGE1_TRANSITION_INDEX: ${JITSI_STAGE1_TRANSITION_INDEX:-3}
      JITSI_STAGE1_MIN_UTTERANCE_CHARS: ${JITSI_STAGE1_MIN_UTTERANCE_CHARS:-20}
      JITSI_STAGE1_MAX_WORDS_PER_UTTERANCE: ${JITSI_STAGE1_MAX_WORDS_PER_UTTERANCE:-50}
      JITSI_STAGE1_MIN_INFERENCE_UTTERANCES: ${JITSI_STAGE1_MIN_INFERENCE_UTTERANCES:-2}
      JITSI_STAGE1_SHORT_MEETING_MAX_UTTERANCES: ${JITSI_STAGE1_SHORT_MEETING_MAX_UTTERANCES:-6}
      JITSI_UPLOAD_STAGE1_ARTIFACTS: ${JITSI_UPLOAD_STAGE1_ARTIFACTS:-true}
      JITSI_STAGE1_OBJECT_PREFIX: ${JITSI_STAGE1_OBJECT_PREFIX:-production/inference_requests/stage1}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    ports:
      - "9000:9000"
    volumes:
      - /mnt/block/user-behaviour/received_transcripts:/mnt/block/user-behaviour/received_transcripts
      - /mnt/block/user-behaviour/parsed_transcripts:/mnt/block/user-behaviour/parsed_transcripts
      - /mnt/block/user-behaviour/inference_requests/stage1:/mnt/block/user-behaviour/inference_requests/stage1
      - /mnt/block/ingest_logs/jitsi_transcript:/mnt/block/ingest_logs/jitsi_transcript
      - ${HOME}/.config/rclone:/config/rclone:ro

  db_task_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: db_task_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD:-proj07}@postgres:5432/${POSTGRES_DB:-proj07_sql_db}"
      DB_TASK_LOG_DIR: /mnt/block/ingest_logs/db_task_worker
      DB_TASK_POLL_INTERVAL_SECONDS: ${DB_TASK_POLL_INTERVAL_SECONDS:-5}
      DB_TASK_FULL_SCAN_INTERVAL_SECONDS: ${DB_TASK_FULL_SCAN_INTERVAL_SECONDS:-300}
      DB_TASK_BATCH_SIZE: ${DB_TASK_BATCH_SIZE:-25}
      DB_TASK_FULL_SCAN_LIMIT: ${DB_TASK_FULL_SCAN_LIMIT:-0}
      DB_TASK_STAGE1_BUILD_ENABLED: ${DB_TASK_STAGE1_BUILD_ENABLED:-true}
      DB_TASK_STAGE1_FORWARD_ENABLED: ${DB_TASK_STAGE1_FORWARD_ENABLED:-true}
      DB_TASK_STAGE2_BUILD_ENABLED: ${DB_TASK_STAGE2_BUILD_ENABLED:-true}
      DB_TASK_STAGE2_FORWARD_ENABLED: ${DB_TASK_STAGE2_FORWARD_ENABLED:-true}
      DB_TASK_USER_SUMMARY_ENABLED: ${DB_TASK_USER_SUMMARY_ENABLED:-true}
      DB_TASK_MEETING_VALIDITY_ENABLED: ${DB_TASK_MEETING_VALIDITY_ENABLED:-true}
      STAGE1_ARTIFACT_VERSION: ${STAGE1_ARTIFACT_VERSION:-1}
      STAGE1_BUILD_MAX_ATTEMPTS: ${STAGE1_BUILD_MAX_ATTEMPTS:-8}
      STAGE1_FORWARD_MAX_ATTEMPTS: ${STAGE1_FORWARD_MAX_ATTEMPTS:-8}
      STAGE2_BUILD_MAX_ATTEMPTS: ${STAGE2_BUILD_MAX_ATTEMPTS:-8}
      STAGE2_FORWARD_MAX_ATTEMPTS: ${STAGE2_FORWARD_MAX_ATTEMPTS:-8}
      USER_SUMMARY_MATERIALIZE_MAX_ATTEMPTS: ${USER_SUMMARY_MATERIALIZE_MAX_ATTEMPTS:-8}
      WORKFLOW_TASK_STALE_AFTER_SECONDS: ${WORKFLOW_TASK_STALE_AFTER_SECONDS:-600}
    command: ["python", "-m", "proj07_services.workers.db_task_worker"]
    volumes:
      - /mnt/block/ingest_logs/db_task_worker:/mnt/block/ingest_logs/db_task_worker

  stage1_payload_service:
