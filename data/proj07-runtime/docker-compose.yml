      WORKFLOW_TASK_BACKOFF_BASE_SECONDS: ${WORKFLOW_TASK_BACKOFF_BASE_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_MAX_SECONDS: ${WORKFLOW_TASK_BACKOFF_MAX_SECONDS:-900}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    command: ["python", "-m", "proj07_services.workers.stage2_forward_service"]
    volumes:
      - /mnt/block/user-behaviour/inference_requests/stage2:/mnt/block/user-behaviour/inference_requests/stage2
      - /mnt/block/user-behaviour/inference_responses/stage2:/mnt/block/user-behaviour/inference_responses/stage2
      - /mnt/block/ingest_logs/stage2_forward_service:/mnt/block/ingest_logs/stage2_forward_service
