      STAGE2_MODEL_NAME: ${STAGE2_MODEL_NAME:-stage2-summarizer}
      STAGE2_MODEL_VERSION: ${STAGE2_MODEL_VERSION:-}
      STAGE2_PROMPT_VERSION: ${STAGE2_PROMPT_VERSION:-}
      STAGE2_FORWARD_UPLOAD_ARTIFACTS: ${STAGE2_FORWARD_UPLOAD_ARTIFACTS:-true}
