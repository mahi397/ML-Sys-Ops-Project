      STAGE1_FORWARD_WORKER_LOG_DIR: /mnt/block/ingest_logs/stage1_forward_service
      STAGE1_FORWARD_WORKER_POLL_INTERVAL_SECONDS: ${STAGE1_FORWARD_WORKER_POLL_INTERVAL_SECONDS:-5}
      STAGE1_OUTPUT_ROOT: /mnt/block/user-behaviour/inference_requests/stage1
      STAGE1_RESPONSE_ROOT: /mnt/block/user-behaviour/inference_responses/stage1
      STAGE1_ARTIFACT_VERSION: ${STAGE1_ARTIFACT_VERSION:-1}
      STAGE1_FORWARD_URL: ${STAGE1_FORWARD_URL:-http://192.5.86.194:8000/segment}
      STAGE1_FORWARD_PAYLOAD_FORMAT: ${STAGE1_FORWARD_PAYLOAD_FORMAT:-requests_json}
      STAGE1_FORWARD_TIMEOUT_SECONDS: ${STAGE1_FORWARD_TIMEOUT_SECONDS:-300}
      STAGE1_RESPONSE_PREFIX: ${STAGE1_RESPONSE_PREFIX:-production/inference_responses/stage1}
      STAGE1_FORWARD_UPLOAD_ARTIFACTS: ${STAGE1_FORWARD_UPLOAD_ARTIFACTS:-true}
      STAGE2_BUILD_MAX_ATTEMPTS: ${STAGE2_BUILD_MAX_ATTEMPTS:-8}
      WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS: ${WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_BASE_SECONDS: ${WORKFLOW_TASK_BACKOFF_BASE_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_MAX_SECONDS: ${WORKFLOW_TASK_BACKOFF_MAX_SECONDS:-900}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
