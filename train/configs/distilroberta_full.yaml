# configs/distilroberta_full.yaml
# Candidate v3: distilroberta-base, full fine-tune
# 6 layers vs 12 in roberta-base → ~2x faster inference, ~40% smaller.
# Tradeoff: some quality loss vs roberta-base full.
# "Efficient" candidate — good if serving latency is critical (<2s SLA).
model_name: distilroberta-base
freeze_backbone: false
lr: 3e-5
batch_size: 32
epochs: 8
warmup_ratio: 0.1
weight_decay: 0.05
max_seq_len: 256
dropout: 0.2
max_oversample: 5.0
early_stopping_patience: 3
data_dir: /data/ami_processed
output_dir: /artifacts/models
experiment_name: jitsi-topic-segmentation
seed: 42
