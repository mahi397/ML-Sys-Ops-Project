# configs/roberta_base_frozen.yaml
# Candidate v1: roberta-base, frozen backbone
# Trains head only → fastest training, smallest GPU memory, fastest inference.
# Tradeoff: lower task-specific quality than full fine-tune.
# "Speed" candidate in the manager table.
model_name: roberta-base
freeze_backbone: true
lr: 2e-4          # higher lr ok when backbone is frozen
batch_size: 32    # can fit larger batch since no backbone gradients
epochs: 5
warmup_ratio: 0.1
weight_decay: 0.01
max_seq_len: 256
dropout: 0.1
early_stopping_patience: 3
data_dir: /data/ami_processed
output_dir: /artifacts/models
experiment_name: jitsi-topic-segmentation
seed: 42
