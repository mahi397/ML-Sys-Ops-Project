global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
        action: rollback
      receiver: 'rollback-handler'
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: critical
      receiver: 'critical'

receivers:
  - name: 'default'
  - name: 'critical'
  - name: 'rollback-handler'
    webhook_configs:
      - url: 'http://ray-serve:8000/rollback'
        send_resolved: false