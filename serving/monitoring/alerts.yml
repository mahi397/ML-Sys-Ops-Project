groups:
  - name: latency_sla
    rules:
      - alert: SegmentationLatencyHigh
        expr: histogram_quantile(0.95, rate(jitsi_request_latency_seconds_bucket{endpoint="segment"}[5m])) > 2.0
        for: 2m
        labels:
          severity: critical
          action: rollback
        annotations:
          summary: "Segmentation p95 > 2s SLA — trigger rollback"
          description: "p95 = {{ $value }}s"

      - alert: SummarizationLatencyHigh
        expr: histogram_quantile(0.95, rate(jitsi_request_latency_seconds_bucket{endpoint="summarize"}[5m])) > 30.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Summarization p95 > 30s"

      - alert: SummarizationCritical
        expr: histogram_quantile(0.95, rate(jitsi_request_latency_seconds_bucket{endpoint="summarize"}[10m])) > 60.0
        for: 2m
        labels:
          severity: critical
          action: rollback
        annotations:
          summary: "Summarization p95 > 60s — severe degradation, trigger rollback"

  - name: error_rate
    rules:
      - alert: HighErrorRate
        expr: >
          (rate(jitsi_requests_total{status="error"}[5m])
            / rate(jitsi_requests_total[5m]) > 0.05)
          and rate(jitsi_requests_total[5m]) > 0
        for: 3m
        labels:
          severity: critical
          action: rollback
        annotations:
          summary: "Error rate > 5% — trigger rollback"

      - alert: ServiceDown
        expr: >
          absent(jitsi_requests_total{status="success"})
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "jitsi_requests_total metric absent — Ray Serve may be down"
          description: "Metric disappeared entirely. Service is likely crashed or not exporting metrics."

  - name: resources
    rules:
      - alert: GPUMemoryHigh
        # 21504 MB = 87.5% of 24576 MB (RTX 6000 Ada 24GB)
        expr: jitsi_gpu_memory_used_mb > 21504
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU memory > 87.5% of RTX 6000 (24GB)"

      - alert: CPUHigh
        expr: jitsi_cpu_utilization_percent > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU > 85%"

  - name: model_health
    rules:
      - alert: ModelNotLoaded
        expr: jitsi_model_loaded == 0
        expr: |
          jitsi_model_loaded == 0
          unless on(model_name)
          jitsi_model_loaded == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.model_name }} failed to load"

      - alert: LowConfidenceScores
        expr: histogram_quantile(0.5, rate(jitsi_boundary_confidence_bucket[10m])) < 0.3
        for: 3m
        labels:
          severity: warning
          action: investigate
        annotations:
          summary: "Median boundary confidence < 0.3 — possible data drift"

      - alert: RetrainingThresholdReached
        expr: jitsi_feedback_events_total >= 5
        for: 5m
        labels:
          severity: warning
          action: retrain
        annotations:
          summary: "5 feedback events — trigger retraining"
          
  - name: user_feedback_drift
    rules:
      - alert: HighBoundaryCorrections
        expr: increase(jitsi_feedback_corrections_total{action="remove_boundary"}[1h]) > 10
        for: 0m
        labels:
          severity: warning
          action: investigate
        annotations:
          summary: "10+ boundary removals in 1 hour — users disagreeing with model segmentation"
          description: "{{ $value }} corrections in last hour. Possible model drift — check confidence distribution."

      - alert: FeedbackDriftSpiking
        expr: |
          rate(jitsi_feedback_corrections_total{action="remove_boundary"}[10m])
          / rate(jitsi_requests_total{endpoint="segment",status="success"}[10m]) > 0.3
        for: 5m
        labels:
          severity: critical
          action: investigate
        annotations:
          summary: "30%+ of segment boundaries being manually corrected — model output unreliable"        