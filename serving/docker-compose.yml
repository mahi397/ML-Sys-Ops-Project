services:

  # Baseline — PyTorch CPU (no GPU, no optimizations)
  api_pytorch_cpu:
    build: .
    ports:
      - "8002:8000"
    environment:
      - SERVING_MODE=pytorch
      - BOUNDARY_THRESHOLD=0.5
      - MODEL_PATH=/models/roberta-seg
      - LLM_MODEL_PATH=/models/mistral-7b-instruct-v0.2.Q4_K_M.gguf
      - CUDA_VISIBLE_DEVICES=""
    volumes:
      - ./models:/models

  # Option A — PyTorch GPU baseline
  api_pytorch_gpu:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SERVING_MODE=pytorch
      - BOUNDARY_THRESHOLD=0.5
      - MODEL_PATH=/models/roberta-seg
      - LLM_MODEL_PATH=/models/mistral-7b-instruct-v0.2.Q4_K_M.gguf
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Option B — ONNX CPU
  api_onnx_cpu:
    build: .
    ports:
      - "8001:8000"
    environment:
      - SERVING_MODE=onnx_cpu
      - BOUNDARY_THRESHOLD=0.5
      - ONNX_MODEL_PATH=/models/roberta_seg.onnx
      - LLM_MODEL_PATH=/models/mistral-7b-instruct-v0.2.Q4_K_M.gguf
    volumes:
      - ./models:/models

  # Option C — ONNX GPU via Triton
  triton:
    image: nvcr.io/nvidia/tritonserver:23.10-py3
    ports:
      - "8100:8000"
      - "8101:8001"
      - "8102:8002"
    volumes:
      - ./triton_models:/models
    command: tritonserver --model-repository=/models
    profiles:
      - triton
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  api_onnx_gpu:
    build: .
    ports:
      - "8003:8000"
    environment:
      - SERVING_MODE=onnx_gpu
      - BOUNDARY_THRESHOLD=0.5
      #- MODEL_PATH=/models 
      - ONNX_MODEL_PATH=/models/roberta_seg.onnx
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  # async recap worker
  worker:
    build: .
    command: python3 worker/recap_worker.py
    environment:
      - BOUNDARY_THRESHOLD=0.5
      - MODEL_PATH=/models/roberta-seg
      - LLM_MODEL_PATH=/models/mistral-7b-instruct-v0.2.Q4_K_M.gguf
    volumes:
      - ./models:/models
    depends_on:
      - api_pytorch

#multiworker PyTorch with 4 workers (for better GPU utilization)
  api_pytorch_multiworker:
    build: .
    ports:
      - "8004:8000"
    environment:
      - SERVING_MODE=pytorch
      - BOUNDARY_THRESHOLD=0.5
      - MODEL_PATH=/models/roberta-seg
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]