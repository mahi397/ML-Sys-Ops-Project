###############################################################################
# Jitsi Topic Segmentation & Recap — Full System Docker Compose
#
# Usage:
#   cp .env.example .env        # fill in secrets + floating IP
#   docker compose up -d        # brings up everything
#   docker compose logs -f      # watch logs
#
# Services are grouped:
#   1. Jitsi stack       — official images, config only
#   2. Platform          — MLflow, Postgres, MinIO (shared infra)
#   3. Data pipeline     — Aneesh's containers
#   4. Serving + UI      — Shruti's containers + Mahima's recap UI
#   5. Training/MLOps    — Mahima's containers
#   6. Monitoring        — Prometheus + Grafana
#
# Single docker compose up brings up the entire system.
# Profiles:
#   --profile retrain          triggers retraining pipeline
#   --profile emulated-traffic runs data generator for ongoing operation
###############################################################################

volumes:
  jitsi_web_config:
  jitsi_jvb_config:
  jitsi_prosody_config:
  jitsi_jicofo_config:
  jigasi_config:
  prometheus_data:
  grafana_data:
  ray_tmp:
  # NOTE: postgres and minio use bind mounts to /mnt/block for persistence
  # across VM restarts. Named volumes would be lost if VM is deleted.

networks:
  recap-net:
    driver: bridge

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # 1. JITSI STACK — official images
  # ═══════════════════════════════════════════════════════════════════════════

  jitsi-web:
    image: jitsi/web:stable-9823
    restart: unless-stopped
    ports:
      - "${JITSI_PORT:-8443}:443"
      - "8080:80"
    environment:
      - ENABLE_GUESTS=1
      - ENABLE_TRANSCRIPTIONS=1
      - PUBLIC_URL=https://${FLOATING_IP}:${JITSI_PORT:-8443}
      - TZ=UTC
    volumes:
      - jitsi_web_config:/config
      - ./jitsi/custom-config.js:/config/custom-config.js:ro
    networks:
      - recap-net

  jitsi-prosody:
    image: jitsi/prosody:stable-9823
    restart: unless-stopped
    environment:
      - ENABLE_GUESTS=1
      - PUBLIC_URL=https://${FLOATING_IP}:${JITSI_PORT:-8443}
      - TZ=UTC
    volumes:
      - jitsi_prosody_config:/config
    networks:
      - recap-net

  jitsi-jicofo:
    image: jitsi/jicofo:stable-9823
    restart: unless-stopped
    environment:
      - TZ=UTC
    volumes:
      - jitsi_jicofo_config:/config
    networks:
      - recap-net

  jitsi-jvb:
    image: jitsi/jvb:stable-9823
    restart: unless-stopped
    ports:
      - "${JVB_PORT:-10000}:10000/udp"
    environment:
      - JVB_ADVERTISE_IPS=${FLOATING_IP}
      - JVB_PORT=${JVB_PORT:-10000}
      - TZ=UTC
    volumes:
      - jitsi_jvb_config:/config
    networks:
      - recap-net

  jigasi:
    image: jitsi/jigasi:stable-9823
    restart: unless-stopped
    environment:
      - ENABLE_TRANSCRIPTIONS=1
      - TZ=UTC
    volumes:
      - jigasi_config:/config
    networks:
      - recap-net

  # ═══════════════════════════════════════════════════════════════════════════
  # 2. PLATFORM — shared infrastructure (single instance, everyone uses)
  # ═══════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proj07_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Default DB is proj07_sql_db; mlflowdb is created separately
      POSTGRES_DB: proj07_sql_db
    volumes:
      # Bind mount to block storage — survives VM restarts and reattachment
      - /mnt/block/postgres_data:/var/lib/postgresql/data
      - ./platform/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proj07_user}"]
      interval: 10s
      retries: 5
    networks:
      - recap-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      RAY_ADDRESS: ray://ray-head:6379
      RAY_STORAGE: s3://ray-checkpoints/
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      # Bind mount to block storage — survives VM restarts
      - /mnt/block/minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1
      interval: 1s
      timeout: 10s
      retries: 5
    networks:
      - recap-net

  # Add after minio service — bucket creation for both MLflow and Ray
  minio-create-buckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 ${MINIO_USER:-minioadmin} ${MINIO_PASSWORD} &&
      if ! mc ls minio/ray-checkpoints; then
        mc mb minio/ray-checkpoints &&
        echo 'Bucket proj07-ray-checkpoints created'
      else
        echo 'Bucket proj07-ray-checkpoints already exists';
      fi &&
      if ! mc ls minio/${BUCKET_NAME:-proj07-mlflow-artifacts}; then
        mc mb minio/${BUCKET_NAME:-proj07-mlflow-artifacts} &&
        echo 'Bucket proj07-mlflow-artifacts created'
      else
        echo 'Bucket proj07-mlflow-artifacts already exists';
      fi"
    networks:
      - recap-net

  # Add after minio-create-buckets — Ray head
  ray-head:
    image: rayproject/ray:2.54.0
    restart: unless-stopped
    command: |
      /bin/sh -c "
      ray start --head --port=6379
      --dashboard-host=0.0.0.0
      --dashboard-port=8265
      --block
      --num-cpus=4"
    ports:
      - "6379:6379"
      - "8265:8265"
    shm_size: '4g'
    volumes:
      - /mnt/block/ray-checkpoints:/tmp/ray-checkpoints  # ← bind mount like postgres/minio
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_PASSWORD}
      - AWS_ENDPOINT_URL=http://minio:9000
    depends_on:
      minio:
        condition: service_healthy
      minio-create-buckets:
        condition: service_completed_successfully
    networks:
      - recap-net

  mlflow:
    # Using v3.9.0 to match the lab setup that has historical training runs
    image: ghcr.io/mlflow/mlflow:v3.9.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
    command:
      - "pip install psycopg2-binary boto3 && mlflow server --backend-store-uri postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD}@postgres:5432/mlflowdb --artifacts-destination s3://${BUCKET_NAME}/ --serve-artifacts --host 0.0.0.0 --port 8000"
    environment:
      # MLflow artifact store — CHI@TACC S3 (same bucket as lab setup)
      MLFLOW_TRACKING_URI: http://0.0.0.0:5000
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      BUCKET_NAME: ${BUCKET_NAME:-proj07-mlflow-artifacts}
    ports:
      - "5000:5000"
    networks:
      - recap-net

  # ═══════════════════════════════════════════════════════════════════════════
  # 3. DATA PIPELINE — Aneesh's containers
  # ═══════════════════════════════════════════════════════════════════════════

  data-pipeline:
    build: ./data-pipeline
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD}@postgres:5432/proj07_sql_db
      MINIO_ENDPOINT: http://minio:9000
      MINIO_USER: ${MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
    networks:
      - recap-net

  data-generator:
    build: ./data-pipeline
    command: python data_generator.py
    restart: unless-stopped
    depends_on:
      - serving-api
      - postgres
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD}@postgres:5432/proj07_sql_db
      SERVING_API_URL: http://serving-api:8000
    networks:
      - recap-net
    profiles:
      - emulated-traffic   # docker compose --profile emulated-traffic up -d data-generator

  batch-pipeline:
    build: ./data-pipeline
    command: python batch_compile.py
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD}@postgres:5432/proj07_sql_db
      MINIO_ENDPOINT: http://minio:9000
      MINIO_USER: ${MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      OBJSTORE_BUCKET: ${OBJSTORE_BUCKET:-objstore-proj07}
      RCLONE_REMOTE: ${RCLONE_REMOTE:-chi_tacc}
    networks:
      - recap-net
    profiles:
      - retrain   # docker compose --profile retrain run batch-pipeline

  # ═══════════════════════════════════════════════════════════════════════════
  # 4. SERVING + UI — Shruti's API + Mahima's Recap UI
  # ═══════════════════════════════════════════════════════════════════════════

  serving-api:
    build: ./serving
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD}@postgres:5432/proj07_sql_db
      # MLflow for model loading — port 8000
      MLFLOW_TRACKING_URI: http://mlflow:8000
      MODEL_NAME: jitsi-topic-segmenter
      MODEL_ALIAS: production
      # MinIO for local artifact cache
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8001:8000"
    networks:
      - recap-net

  recap-ui:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./recap-ui/index.html:/usr/share/nginx/html/index.html:ro
      - ./recap-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8085:80"
    depends_on:
      - serving-api
    networks:
      - recap-net

  # ═══════════════════════════════════════════════════════════════════════════
  # 5. TRAINING / MLOPS — Mahima's containers
  # ═══════════════════════════════════════════════════════════════════════════

  retrain-watcher:
    build: ./train
    command: python retrain_watcher.py
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD}@postgres:5432/proj07_sql_db
      RETRAIN_THRESHOLD: ${RETRAIN_THRESHOLD:-5}
      RETRAIN_CHECK_INTERVAL_SECONDS: ${RETRAIN_CHECK_INTERVAL_SECONDS:-300}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # MinIO for model artifact access
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      RCLONE_REMOTE: ${RCLONE_REMOTE:-chi_tacc}
      OBJSTORE_BUCKET: ${OBJSTORE_BUCKET:-objstore-proj07}
    volumes:
      - /mnt/block:/mnt/block
      - /home/cc/.config/rclone:/root/.config/rclone:ro
      - /home/cc/nltk_data:/root/nltk_data:ro
    networks:
      - recap-net

  retrain-job:
    build: ./train
    command: python retrain.py
    shm_size: '10g'
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD}@postgres:5432/proj07_sql_db
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MINIO_ENDPOINT: http://minio:9000
      # MinIO for model artifact storage
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
      AWS_ENDPOINT_URL: http://minio:9000
      RAY_ADDRESS: ray://ray-head:6379
      RAY_STORAGE: s3://ray-checkpoints/
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MODEL_NAME: jitsi-topic-segmenter
      MLFLOW_AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      MLFLOW_AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      OBJSTORE_BUCKET: ${OBJSTORE_BUCKET:-objstore-proj07}
      RCLONE_REMOTE: ${RCLONE_REMOTE:-chi_tacc}
    volumes:
      - /mnt/block:/mnt/block
      - /home/cc/.config/rclone:/root/.config/rclone:ro
      - /home/cc/nltk_data:/root/nltk_data:ro
    networks:
      - recap-net
    profiles:
      - retrain   # docker compose --profile retrain run retrain-job

  # ═══════════════════════════════════════════════════════════════════════════
  # 6. MONITORING — Prometheus + Grafana
  # ═══════════════════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - recap-net

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - recap-net
