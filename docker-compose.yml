###############################################################################
# Jitsi Topic Segmentation & Recap — Full System Docker Compose
#
# Usage:
#   cp .env.example .env        # fill in secrets + floating IP
#   docker compose up -d        # brings up everything
#   docker compose logs -f      # watch logs
#
# Services are grouped:
#   1. Platform          — Postgres, MinIO, MLflow (shared infra)
#   2. Data pipeline     — ingest, workflow workers, drift monitor
#   3. Serving           — Ray Serve (RoBERTa + Mistral), single Ray cluster
#   4. Training/MLOps    — retrain watcher + job (standalone Ray, GPU via nvidia runtime)
#   5. Monitoring        — Prometheus, Grafana, AlertManager, Node Exporter
#
# Jitsi stack is a separate compose project: bash jitsi-deployment/install-jitsi-vm.sh
#
# Single docker compose up brings up the entire system.
# Profiles:
#   --profile retrain          triggers retraining pipeline
#   --profile emulated-traffic runs data generator for ongoing operation
###############################################################################

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  ray_tmp:
  recap_data:
  # NOTE: postgres and minio use bind mounts to /mnt/block for persistence
  # across VM restarts. Named volumes would be lost if VM is deleted.

networks:
  recap-net:
    driver: bridge

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # NOTE: Jitsi Meet stack (web, prosody, jicofo, jvb, jigasi, vosk,
  # meeting-portal-app, transcript-uploader) is managed as a SEPARATE compose
  # project installed by: bash jitsi-deployment/install-jitsi-vm.sh
  #
  # It lives in /mnt/block/jitsi/ and uses the meet.jitsi Docker network.
  # It connects to this ML stack via FLOATING_IP:
  #   - transcript-uploader  → http://FLOATING_IP:9099/ingest/jitsi-transcript
  #   - meeting-portal-app   → postgresql://FLOATING_IP:5432/proj07_sql_db
  #
  # Set DEPLOY_JITSI=true in setup.sh to auto-install it.
  # ═══════════════════════════════════════════════════════════════════════════

  # ═══════════════════════════════════════════════════════════════════════════
  # 1. PLATFORM — shared infrastructure (single instance, everyone uses)
  # ═══════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proj07_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Default DB is proj07_sql_db; mlflowdb is created separately
      POSTGRES_DB: proj07_sql_db
    volumes:
      # Bind mount to block storage — survives VM restarts and reattachment
      - /mnt/block/postgres_data:/var/lib/postgresql/data
      - ./platform/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proj07_user}"]
      interval: 10s
      retries: 5
    networks:
      - recap-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      # Bind mount to block storage — survives VM restarts
      - /mnt/block/minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1
      interval: 1s
      timeout: 10s
      retries: 5
    networks:
      - recap-net

  # Add after minio service — bucket creation for both MLflow and Ray
  minio-create-buckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    container_name: minio-create-buckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 ${MINIO_USER:-minioadmin} ${MINIO_PASSWORD} &&
      if ! mc ls minio/ray-checkpoints; then
        mc mb minio/ray-checkpoints &&
        echo 'Bucket proj07-ray-checkpoints created'
      else
        echo 'Bucket proj07-ray-checkpoints already exists';
      fi &&
      if ! mc ls minio/${BUCKET_NAME:-proj07-mlflow-artifacts}; then
        mc mb minio/${BUCKET_NAME:-proj07-mlflow-artifacts} &&
        echo 'Bucket proj07-mlflow-artifacts created'
      else
        echo 'Bucket proj07-mlflow-artifacts already exists';
      fi"
    networks:
      - recap-net

  mlflow:
    # Using v3.9.0 to match the lab setup that has historical training runs
    image: ghcr.io/mlflow/mlflow:v3.9.0
    container_name: mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
    command:
      - "pip install psycopg2-binary boto3 && mlflow server --backend-store-uri postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD}@postgres:5432/mlflowdb --artifacts-destination s3://${BUCKET_NAME}/ --serve-artifacts --host 0.0.0.0 --port 5000"
    environment:
      # MLflow artifact store — CHI@TACC S3 (same bucket as lab setup)
      MLFLOW_TRACKING_URI: http://0.0.0.0:5000
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      BUCKET_NAME: ${BUCKET_NAME:-proj07-mlflow-artifacts}
    ports:
      - "5000:5000"
    networks:
      - recap-net

  # ═══════════════════════════════════════════════════════════════════════════
  # 3. DATA PIPELINE — ingest, workflow workers, retraining, drift monitor
  # ═══════════════════════════════════════════════════════════════════════════

  adminer:
    image: adminer:4.8.1
    container_name: adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-5050}:8080"
    networks:
      - recap-net

  jitsi_transcript_receiver:
    build:
      context: ./data/proj07-runtime
      dockerfile: Dockerfile
    container_name: jitsi_transcript_receiver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      INGEST_TOKEN: ${INGEST_TOKEN:-}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD:-proj07}@postgres:5432/${POSTGRES_DB:-proj07_sql_db}"
      JITSI_SAVE_DIR: /mnt/block/user-behaviour/received_transcripts
      JITSI_LOG_DIR: /mnt/block/ingest_logs/jitsi_transcript
      JITSI_BUILD_STAGE1_AFTER_INGEST: ${JITSI_BUILD_STAGE1_AFTER_INGEST:-false}
      JITSI_STAGE1_OUTPUT_ROOT: /mnt/block/user-behaviour/inference_requests/stage1
      JITSI_STAGE1_WINDOW_SIZE: ${JITSI_STAGE1_WINDOW_SIZE:-7}
      JITSI_STAGE1_TRANSITION_INDEX: ${JITSI_STAGE1_TRANSITION_INDEX:-3}
      JITSI_STAGE1_MIN_UTTERANCE_CHARS: ${JITSI_STAGE1_MIN_UTTERANCE_CHARS:-20}
      JITSI_STAGE1_MAX_WORDS_PER_UTTERANCE: ${JITSI_STAGE1_MAX_WORDS_PER_UTTERANCE:-50}
      JITSI_STAGE1_MIN_INFERENCE_UTTERANCES: ${JITSI_STAGE1_MIN_INFERENCE_UTTERANCES:-2}
      JITSI_STAGE1_SHORT_MEETING_MAX_UTTERANCES: ${JITSI_STAGE1_SHORT_MEETING_MAX_UTTERANCES:-6}
      JITSI_UPLOAD_STAGE1_ARTIFACTS: ${JITSI_UPLOAD_STAGE1_ARTIFACTS:-true}
      JITSI_STAGE1_OBJECT_PREFIX: ${JITSI_STAGE1_OBJECT_PREFIX:-production/inference_requests/stage1}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    ports:
      - "${INGEST_PORT:-9099}:9000"
    volumes:
      - /mnt/block/user-behaviour/received_transcripts:/mnt/block/user-behaviour/received_transcripts
      - /mnt/block/user-behaviour/parsed_transcripts:/mnt/block/user-behaviour/parsed_transcripts
      - /mnt/block/user-behaviour/inference_requests/stage1:/mnt/block/user-behaviour/inference_requests/stage1
      - /mnt/block/ingest_logs/jitsi_transcript:/mnt/block/ingest_logs/jitsi_transcript
      - ${HOME}/.config/rclone:/config/rclone:ro
    networks:
      - recap-net

  db_task_worker:
    build:
      context: ./data/proj07-runtime
      dockerfile: Dockerfile
    container_name: db_task_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD:-proj07}@postgres:5432/${POSTGRES_DB:-proj07_sql_db}"
      DB_TASK_LOG_DIR: /mnt/block/ingest_logs/db_task_worker
      DB_TASK_POLL_INTERVAL_SECONDS: ${DB_TASK_POLL_INTERVAL_SECONDS:-5}
      DB_TASK_FULL_SCAN_INTERVAL_SECONDS: ${DB_TASK_FULL_SCAN_INTERVAL_SECONDS:-300}
      DB_TASK_BATCH_SIZE: ${DB_TASK_BATCH_SIZE:-25}
      DB_TASK_FULL_SCAN_LIMIT: ${DB_TASK_FULL_SCAN_LIMIT:-0}
      DB_TASK_STAGE1_BUILD_ENABLED: ${DB_TASK_STAGE1_BUILD_ENABLED:-true}
      DB_TASK_STAGE1_FORWARD_ENABLED: ${DB_TASK_STAGE1_FORWARD_ENABLED:-true}
      DB_TASK_STAGE2_BUILD_ENABLED: ${DB_TASK_STAGE2_BUILD_ENABLED:-true}
      DB_TASK_STAGE2_FORWARD_ENABLED: ${DB_TASK_STAGE2_FORWARD_ENABLED:-true}
      DB_TASK_USER_SUMMARY_ENABLED: ${DB_TASK_USER_SUMMARY_ENABLED:-true}
      DB_TASK_MEETING_VALIDITY_ENABLED: ${DB_TASK_MEETING_VALIDITY_ENABLED:-true}
      STAGE1_ARTIFACT_VERSION: ${STAGE1_ARTIFACT_VERSION:-1}
      STAGE1_BUILD_MAX_ATTEMPTS: ${STAGE1_BUILD_MAX_ATTEMPTS:-8}
      STAGE1_FORWARD_MAX_ATTEMPTS: ${STAGE1_FORWARD_MAX_ATTEMPTS:-8}
      STAGE2_BUILD_MAX_ATTEMPTS: ${STAGE2_BUILD_MAX_ATTEMPTS:-8}
      STAGE2_FORWARD_MAX_ATTEMPTS: ${STAGE2_FORWARD_MAX_ATTEMPTS:-8}
      USER_SUMMARY_MATERIALIZE_MAX_ATTEMPTS: ${USER_SUMMARY_MATERIALIZE_MAX_ATTEMPTS:-8}
      WORKFLOW_TASK_STALE_AFTER_SECONDS: ${WORKFLOW_TASK_STALE_AFTER_SECONDS:-600}
    command: ["python", "-m", "proj07_services.workers.db_task_worker"]
    volumes:
      - /mnt/block/ingest_logs/db_task_worker:/mnt/block/ingest_logs/db_task_worker
    networks:
      - recap-net

  stage1_payload_service:
    build:
      context: ./data/proj07-runtime
      dockerfile: Dockerfile
    container_name: stage1_payload_service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD:-proj07}@postgres:5432/${POSTGRES_DB:-proj07_sql_db}"
      STAGE1_BUILD_WORKER_LOG_DIR: /mnt/block/ingest_logs/stage1_payload_service
      STAGE1_BUILD_WORKER_POLL_INTERVAL_SECONDS: ${STAGE1_BUILD_WORKER_POLL_INTERVAL_SECONDS:-5}
      STAGE1_OUTPUT_ROOT: /mnt/block/user-behaviour/inference_requests/stage1
      STAGE1_WINDOW_SIZE: ${STAGE1_WINDOW_SIZE:-7}
      STAGE1_TRANSITION_INDEX: ${STAGE1_TRANSITION_INDEX:-3}
      STAGE1_MIN_UTTERANCE_CHARS: ${STAGE1_MIN_UTTERANCE_CHARS:-20}
      STAGE1_MAX_WORDS_PER_UTTERANCE: ${STAGE1_MAX_WORDS_PER_UTTERANCE:-50}
      STAGE1_MIN_INFERENCE_UTTERANCES: ${STAGE1_MIN_INFERENCE_UTTERANCES:-2}
      STAGE1_SHORT_MEETING_MAX_UTTERANCES: ${STAGE1_SHORT_MEETING_MAX_UTTERANCES:-6}
      STAGE1_UPLOAD_ARTIFACTS: ${STAGE1_UPLOAD_ARTIFACTS:-true}
      STAGE1_OBJECT_PREFIX: ${STAGE1_OBJECT_PREFIX:-production/inference_requests/stage1}
      STAGE1_ARTIFACT_VERSION: ${STAGE1_ARTIFACT_VERSION:-1}
      STAGE1_BUILD_TIMEOUT_SECONDS: ${STAGE1_BUILD_TIMEOUT_SECONDS:-300}
      STAGE1_FORWARD_MAX_ATTEMPTS: ${STAGE1_FORWARD_MAX_ATTEMPTS:-8}
      WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS: ${WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_BASE_SECONDS: ${WORKFLOW_TASK_BACKOFF_BASE_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_MAX_SECONDS: ${WORKFLOW_TASK_BACKOFF_MAX_SECONDS:-900}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    command: ["python", "-m", "proj07_services.workers.stage1_payload_service"]
    volumes:
      - /mnt/block/user-behaviour/inference_requests/stage1:/mnt/block/user-behaviour/inference_requests/stage1
      - /mnt/block/ingest_logs/stage1_payload_service:/mnt/block/ingest_logs/stage1_payload_service
      - ${HOME}/.config/rclone:/config/rclone:ro
    networks:
      - recap-net

  stage1_forward_service:
    build:
      context: ./data/proj07-runtime
      dockerfile: Dockerfile
    container_name: stage1_forward_service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD:-proj07}@postgres:5432/${POSTGRES_DB:-proj07_sql_db}"
      STAGE1_FORWARD_WORKER_LOG_DIR: /mnt/block/ingest_logs/stage1_forward_service
      STAGE1_FORWARD_WORKER_POLL_INTERVAL_SECONDS: ${STAGE1_FORWARD_WORKER_POLL_INTERVAL_SECONDS:-5}
      STAGE1_OUTPUT_ROOT: /mnt/block/user-behaviour/inference_requests/stage1
      STAGE1_RESPONSE_ROOT: /mnt/block/user-behaviour/inference_responses/stage1
      STAGE1_ARTIFACT_VERSION: ${STAGE1_ARTIFACT_VERSION:-1}
      STAGE1_FORWARD_URL: ${STAGE1_FORWARD_URL:-http://serving-api:8000/segment}
      STAGE1_FORWARD_PAYLOAD_FORMAT: ${STAGE1_FORWARD_PAYLOAD_FORMAT:-requests_json}
      STAGE1_FORWARD_TIMEOUT_SECONDS: ${STAGE1_FORWARD_TIMEOUT_SECONDS:-300}
      STAGE1_RESPONSE_PREFIX: ${STAGE1_RESPONSE_PREFIX:-production/inference_responses/stage1}
      STAGE1_FORWARD_UPLOAD_ARTIFACTS: ${STAGE1_FORWARD_UPLOAD_ARTIFACTS:-true}
      STAGE2_BUILD_MAX_ATTEMPTS: ${STAGE2_BUILD_MAX_ATTEMPTS:-8}
      WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS: ${WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_BASE_SECONDS: ${WORKFLOW_TASK_BACKOFF_BASE_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_MAX_SECONDS: ${WORKFLOW_TASK_BACKOFF_MAX_SECONDS:-900}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    command: ["python", "-m", "proj07_services.workers.stage1_forward_service"]
    volumes:
      - /mnt/block/user-behaviour/inference_requests/stage1:/mnt/block/user-behaviour/inference_requests/stage1
      - /mnt/block/user-behaviour/inference_responses/stage1:/mnt/block/user-behaviour/inference_responses/stage1
      - /mnt/block/ingest_logs/stage1_forward_service:/mnt/block/ingest_logs/stage1_forward_service
      - ${HOME}/.config/rclone:/config/rclone:ro
    networks:
      - recap-net

  stage2_input_service:
    build:
      context: ./data/proj07-runtime
      dockerfile: Dockerfile
    container_name: stage2_input_service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD:-proj07}@postgres:5432/${POSTGRES_DB:-proj07_sql_db}"
      STAGE2_BUILD_WORKER_LOG_DIR: /mnt/block/ingest_logs/stage2_input_service
      STAGE2_BUILD_WORKER_POLL_INTERVAL_SECONDS: ${STAGE2_BUILD_WORKER_POLL_INTERVAL_SECONDS:-5}
      STAGE1_OUTPUT_ROOT: /mnt/block/user-behaviour/inference_requests/stage1
      STAGE1_RESPONSE_ROOT: /mnt/block/user-behaviour/inference_responses/stage1
      STAGE2_INPUT_ROOT: /mnt/block/user-behaviour/inference_requests/stage2
      SEGMENTS_ROOT: /mnt/block/user-behaviour/reconstructed_segments
      STAGE2_BOUNDARY_THRESHOLD: ${STAGE2_BOUNDARY_THRESHOLD:-0.5}
      STAGE2_UPLOAD_ARTIFACTS: ${STAGE2_UPLOAD_ARTIFACTS:-true}
      STAGE2_OBJECT_PREFIX: ${STAGE2_OBJECT_PREFIX:-production/inference_requests/stage2}
      SEGMENTS_PREFIX: ${SEGMENTS_PREFIX:-production/reconstructed_segments}
      STAGE2_FORWARD_MAX_ATTEMPTS: ${STAGE2_FORWARD_MAX_ATTEMPTS:-8}
      WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS: ${WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_BASE_SECONDS: ${WORKFLOW_TASK_BACKOFF_BASE_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_MAX_SECONDS: ${WORKFLOW_TASK_BACKOFF_MAX_SECONDS:-900}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    command: ["python", "-m", "proj07_services.workers.stage2_input_service"]
    volumes:
      - /mnt/block/user-behaviour/inference_requests/stage1:/mnt/block/user-behaviour/inference_requests/stage1
      - /mnt/block/user-behaviour/inference_responses/stage1:/mnt/block/user-behaviour/inference_responses/stage1
      - /mnt/block/user-behaviour/inference_requests/stage2:/mnt/block/user-behaviour/inference_requests/stage2
      - /mnt/block/user-behaviour/reconstructed_segments:/mnt/block/user-behaviour/reconstructed_segments
      - /mnt/block/ingest_logs/stage2_input_service:/mnt/block/ingest_logs/stage2_input_service
      - ${HOME}/.config/rclone:/config/rclone:ro
    networks:
      - recap-net

  stage2_forward_service:
    build:
      context: ./data/proj07-runtime
      dockerfile: Dockerfile
    container_name: stage2_forward_service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD:-proj07}@postgres:5432/${POSTGRES_DB:-proj07_sql_db}"
      STAGE2_FORWARD_WORKER_LOG_DIR: /mnt/block/ingest_logs/stage2_forward_service
      STAGE2_FORWARD_WORKER_POLL_INTERVAL_SECONDS: ${STAGE2_FORWARD_WORKER_POLL_INTERVAL_SECONDS:-5}
      STAGE2_INPUT_ROOT: /mnt/block/user-behaviour/inference_requests/stage2
      STAGE2_RESPONSE_ROOT: /mnt/block/user-behaviour/inference_responses/stage2
      STAGE1_ARTIFACT_VERSION: ${STAGE1_ARTIFACT_VERSION:-1}
      STAGE2_FORWARD_URL: ${STAGE2_FORWARD_URL:-http://serving-api:8000/summarize}
      STAGE2_FORWARD_PAYLOAD_FORMAT: ${STAGE2_FORWARD_PAYLOAD_FORMAT:-segment_json}
      STAGE2_FORWARD_TIMEOUT_SECONDS: ${STAGE2_FORWARD_TIMEOUT_SECONDS:-300}
      STAGE2_RESPONSE_PREFIX: ${STAGE2_RESPONSE_PREFIX:-production/inference_responses/stage2}
      STAGE2_MODEL_NAME: ${STAGE2_MODEL_NAME:-stage2-summarizer}
      STAGE2_MODEL_VERSION: ${STAGE2_MODEL_VERSION:-}
      STAGE2_PROMPT_VERSION: ${STAGE2_PROMPT_VERSION:-}
      STAGE2_FORWARD_UPLOAD_ARTIFACTS: ${STAGE2_FORWARD_UPLOAD_ARTIFACTS:-true}
      WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS: ${WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_BASE_SECONDS: ${WORKFLOW_TASK_BACKOFF_BASE_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_MAX_SECONDS: ${WORKFLOW_TASK_BACKOFF_MAX_SECONDS:-900}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    command: ["python", "-m", "proj07_services.workers.stage2_forward_service"]
    volumes:
      - /mnt/block/user-behaviour/inference_requests/stage2:/mnt/block/user-behaviour/inference_requests/stage2
      - /mnt/block/user-behaviour/inference_responses/stage2:/mnt/block/user-behaviour/inference_responses/stage2
      - /mnt/block/ingest_logs/stage2_forward_service:/mnt/block/ingest_logs/stage2_forward_service
      - ${HOME}/.config/rclone:/config/rclone:ro
    networks:
      - recap-net

  user_summary_materialize_service:
    build:
      context: ./data/proj07-runtime
      dockerfile: Dockerfile
    container_name: user_summary_materialize_service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD:-proj07}@postgres:5432/${POSTGRES_DB:-proj07_sql_db}"
      USER_SUMMARY_WORKER_LOG_DIR: /mnt/block/ingest_logs/user_summary_materialize_service
      USER_SUMMARY_WORKER_POLL_INTERVAL_SECONDS: ${USER_SUMMARY_WORKER_POLL_INTERVAL_SECONDS:-5}
      USER_SUMMARY_OUTPUT_ROOT: /mnt/block/user-behaviour/user_summary_edits
      USER_SUMMARY_OBJECT_PREFIX: ${USER_SUMMARY_OBJECT_PREFIX:-production/summary_edits}
      USER_SUMMARY_UPLOAD_ARTIFACTS: ${USER_SUMMARY_UPLOAD_ARTIFACTS:-true}
      WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS: ${WORKFLOW_TASK_HEARTBEAT_INTERVAL_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_BASE_SECONDS: ${WORKFLOW_TASK_BACKOFF_BASE_SECONDS:-15}
      WORKFLOW_TASK_BACKOFF_MAX_SECONDS: ${WORKFLOW_TASK_BACKOFF_MAX_SECONDS:-900}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    command: ["python", "-m", "proj07_services.workers.user_summary_materialize_service"]
    volumes:
      - /mnt/block/user-behaviour/user_summary_edits:/mnt/block/user-behaviour/user_summary_edits
      - /mnt/block/ingest_logs/user_summary_materialize_service:/mnt/block/ingest_logs/user_summary_materialize_service
      - ${HOME}/.config/rclone:/config/rclone:ro
    networks:
      - recap-net

  retraining_dataset_service:
    build:
      context: ./data/proj07-runtime
      dockerfile: Dockerfile
    container_name: retraining_dataset_service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD:-proj07}@postgres:5432/${POSTGRES_DB:-proj07_sql_db}"
      RETRAINING_DATASET_WORKER_LOG_DIR: /mnt/block/ingest_logs/retraining_dataset_service
      RETRAINING_DATASET_WORKER_POLL_INTERVAL_SECONDS: ${RETRAINING_DATASET_WORKER_POLL_INTERVAL_SECONDS:-300}
      RETRAINING_DATASET_VALID_MEETING_THRESHOLD: ${RETRAINING_DATASET_VALID_MEETING_THRESHOLD:-50}
      RETRAINING_DATASET_FEEDBACK_EVENT_THRESHOLD: ${RETRAINING_DATASET_FEEDBACK_EVENT_THRESHOLD:-500}
      RETRAINING_DATASET_ADVISORY_LOCK_KEY: ${RETRAINING_DATASET_ADVISORY_LOCK_KEY:-700507}
      RETRAINING_DATASET_UPLOAD_ARTIFACTS: ${RETRAINING_DATASET_UPLOAD_ARTIFACTS:-true}
      RETRAINING_DATASET_NAME: ${RETRAINING_DATASET_NAME:-roberta_stage1}
      RETRAINING_DATASET_ROOT: ${RETRAINING_DATASET_ROOT:-/mnt/block/roberta_stage1}
      RETRAINING_LOCAL_TMP_ROOT: ${RETRAINING_LOCAL_TMP_ROOT:-/mnt/block/staging/feedback_loop}
      RETRAINING_FEEDBACK_POOL_PREFIX: ${RETRAINING_FEEDBACK_POOL_PREFIX:-datasets/roberta_stage1_feedback_pool}
      RETRAINING_DATASET_OBJECT_PREFIX: ${RETRAINING_DATASET_OBJECT_PREFIX:-datasets/roberta_stage1}
      RETRAINING_DATASET_WINDOW_SIZE: ${RETRAINING_DATASET_WINDOW_SIZE:-7}
      RETRAINING_DATASET_TRANSITION_INDEX: ${RETRAINING_DATASET_TRANSITION_INDEX:-3}
      RETRAINING_DATASET_MIN_UTTERANCE_CHARS: ${RETRAINING_DATASET_MIN_UTTERANCE_CHARS:-20}
      RETRAINING_DATASET_MAX_WORDS_PER_UTTERANCE: ${RETRAINING_DATASET_MAX_WORDS_PER_UTTERANCE:-50}
      RETRAINING_DATASET_QUALITY_PSI_THRESHOLD: ${RETRAINING_DATASET_QUALITY_PSI_THRESHOLD:-0.2}
      RETRAINING_DATASET_QUALITY_MAX_DRIFT_SHARE: ${RETRAINING_DATASET_QUALITY_MAX_DRIFT_SHARE:-0.35}
      RETRAINING_DATASET_QUALITY_MIN_FEATURE_SAMPLES: ${RETRAINING_DATASET_QUALITY_MIN_FEATURE_SAMPLES:-25}
      RETRAINING_DATASET_QUALITY_NUMERIC_BIN_COUNT: ${RETRAINING_DATASET_QUALITY_NUMERIC_BIN_COUNT:-10}
      RCLONE_CONFIG: /config/rclone/rclone.conf
      RCLONE_REMOTE: ${RCLONE_REMOTE:-rclone_s3}
      BUCKET: ${BUCKET:-objstore-proj07}
    command: ["python", "-m", "proj07_services.workers.retraining_dataset_service"]
    volumes:
      - /mnt/block/staging/feedback_loop:/mnt/block/staging/feedback_loop
      - /mnt/block/roberta_stage1:/mnt/block/roberta_stage1
      - /mnt/block/ingest_logs/retraining_dataset_service:/mnt/block/ingest_logs/retraining_dataset_service
      - ${HOME}/.config/rclone:/config/rclone:ro
    networks:
      - recap-net

  production_drift_monitor:
    build:
      context: ./data/proj07-runtime
      dockerfile: Dockerfile
    container_name: production_drift_monitor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD:-proj07}@postgres:5432/${POSTGRES_DB:-proj07_sql_db}"
      PRODUCTION_DRIFT_MONITOR_LOG_DIR: /mnt/block/ingest_logs/production_drift_monitor
      PRODUCTION_DRIFT_MONITOR_REPORT_ROOT: /mnt/block/staging/feedback_loop/production_drift_reports
      PRODUCTION_DRIFT_MONITOR_POLL_INTERVAL_SECONDS: ${PRODUCTION_DRIFT_MONITOR_POLL_INTERVAL_SECONDS:-900}
      PRODUCTION_DRIFT_MONITOR_LOOKBACK_HOURS: ${PRODUCTION_DRIFT_MONITOR_LOOKBACK_HOURS:-24}
      PRODUCTION_DRIFT_MONITOR_MIN_VALID_MEETINGS: ${PRODUCTION_DRIFT_MONITOR_MIN_VALID_MEETINGS:-5}
      PRODUCTION_DRIFT_MONITOR_DATASET_NAME: ${PRODUCTION_DRIFT_MONITOR_DATASET_NAME:-roberta_stage1}
      PRODUCTION_DRIFT_MONITOR_DATASET_ROOT: ${PRODUCTION_DRIFT_MONITOR_DATASET_ROOT:-/mnt/block/roberta_stage1}
      PRODUCTION_DRIFT_MONITOR_WINDOW_SIZE: ${PRODUCTION_DRIFT_MONITOR_WINDOW_SIZE:-7}
      PRODUCTION_DRIFT_MONITOR_TRANSITION_INDEX: ${PRODUCTION_DRIFT_MONITOR_TRANSITION_INDEX:-3}
      PRODUCTION_DRIFT_MONITOR_MIN_UTTERANCE_CHARS: ${PRODUCTION_DRIFT_MONITOR_MIN_UTTERANCE_CHARS:-20}
      PRODUCTION_DRIFT_MONITOR_MAX_WORDS_PER_UTTERANCE: ${PRODUCTION_DRIFT_MONITOR_MAX_WORDS_PER_UTTERANCE:-50}
      PRODUCTION_DRIFT_MONITOR_PSI_THRESHOLD: ${PRODUCTION_DRIFT_MONITOR_PSI_THRESHOLD:-0.2}
      PRODUCTION_DRIFT_MONITOR_MAX_DRIFT_SHARE: ${PRODUCTION_DRIFT_MONITOR_MAX_DRIFT_SHARE:-0.35}
      PRODUCTION_DRIFT_MONITOR_MIN_FEATURE_SAMPLES: ${PRODUCTION_DRIFT_MONITOR_MIN_FEATURE_SAMPLES:-25}
      PRODUCTION_DRIFT_MONITOR_NUMERIC_BIN_COUNT: ${PRODUCTION_DRIFT_MONITOR_NUMERIC_BIN_COUNT:-10}
    command: ["python", "-m", "proj07_services.workers.production_drift_monitor"]
    volumes:
      - /mnt/block/staging/feedback_loop:/mnt/block/staging/feedback_loop
      - /mnt/block/roberta_stage1:/mnt/block/roberta_stage1
      - /mnt/block/ingest_logs/production_drift_monitor:/mnt/block/ingest_logs/production_drift_monitor
    networks:
      - recap-net

  # ═══════════════════════════════════════════════════════════════════════════
  # 4. SERVING — Ray Serve (RoBERTa segmenter + Mistral summarizer)
  # UI served at http://<ip>:8000/ui by Ray Serve itself
  # ═══════════════════════════════════════════════════════════════════════════

  serving-api:
    build:
      context: ./serving/ray_serve
      dockerfile: Dockerfile.ray
    container_name: jitsi-ray-serve
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    environment:
      MODEL_PATH: /models/roberta-seg
      LLM_MODEL_PATH: /models/mistral-7b-instruct-v0.2.Q4_K_M.gguf
      BOUNDARY_THRESHOLD: "0.5"
      MAX_SEGMENT_UTTERANCES: "200"
      RAY_DEDUP_LOGS: "0"
      MODEL_VERSION: roberta-base-v0
      DATABASE_URL: postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD:-proj07}@postgres:5432/${POSTGRES_DB:-proj07_sql_db}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_ALIAS: production
      MODEL_RELOAD_INTERVAL_SECONDS: "300"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
    ports:
      - "8000:8000"    # API: /health /segment /summarize /recap /ui /metrics
      - "8265:8265"    # Ray Dashboard
      - "9091:9091"    # Metrics probe
    shm_size: '2gb'
    volumes:
      - ./serving/models:/models
      - ray_tmp:/tmp/ray
      - recap_data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - recap-net

  # ═══════════════════════════════════════════════════════════════════════════
  # 5. TRAINING / MLOPS — Mahima's containers
  # ═══════════════════════════════════════════════════════════════════════════

  retrain-watcher:
    build: ./train
    container_name: retrain-watcher
    command: retrain_watcher.py
    runtime: nvidia
    shm_size: '10g'
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      serving-api:
        condition: service_healthy
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      RAY_STORAGE: /mnt/block/ray-checkpoints
      DATABASE_URL: postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD}@postgres:5432/proj07_sql_db
      RETRAIN_THRESHOLD: ${RETRAIN_THRESHOLD:-5}
      RETRAIN_CHECK_INTERVAL_SECONDS: 300
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ENDPOINT_URL: http://minio:9000
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      RCLONE_REMOTE: ${RCLONE_REMOTE:-chi_tacc}
      OBJSTORE_BUCKET: ${OBJSTORE_BUCKET:-objstore-proj07}
      MODEL_NAME: jitsi-topic-segmenter
      TOKENIZERS_PARALLELISM: "false"
      DATASET_VERSION: "2"
    volumes:
      - /mnt/block:/mnt/block
      - /home/cc/.config/rclone:/root/.config/rclone:ro
      - /home/cc/nltk_data:/root/nltk_data:ro
      - /var/run/docker.sock:/var/run/docker.sock  # ← ADD for docker compose access
      - /home/cc/ML-Sys-Ops-Project:/project:ro    # ← ADD so it can find docker-compose.yml
    networks:
      - recap-net

  retrain-job:
    build: ./train
    container_name: retrain-job
    command: retrain.py
    runtime: nvidia
    shm_size: '10g'
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD}@postgres:5432/proj07_sql_db
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MINIO_ENDPOINT: http://minio:9000
      # MinIO creds only for MLflow server proxy
      MINIO_USER: ${MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID} # TACC — for MLflow artifacts
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY} # TACC
      AWS_ENDPOINT_URL: http://minio:9000
      RAY_STORAGE: /mnt/block/ray-checkpoints
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      MODEL_NAME: jitsi-topic-segmenter
      MLFLOW_AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      MLFLOW_AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      OBJSTORE_BUCKET: ${OBJSTORE_BUCKET:-objstore-proj07}
      TOKENIZERS_PARALLELISM: "false"
      DATASET_VERSION: "2"
      RCLONE_REMOTE: ${RCLONE_REMOTE:-chi_tacc}
    volumes:
      - /mnt/block:/mnt/block
      - /home/cc/.config/rclone:/root/.config/rclone:ro
      - /home/cc/nltk_data:/root/nltk_data:ro
    networks:
      - recap-net
    profiles:
      - retrain   # docker compose --profile retrain run retrain-job

  # Runs online_eval.py hourly — logs correction rate / FPR / FNR to MLflow.
  # Keeps the online-evaluation experiment current for the demo.
  # Start with: docker compose --profile monitoring up -d online-eval
  online-eval:
    build: ./train
    container_name: online-eval
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "while true; do
        python /app/online_eval.py --days 7;
        echo '[online-eval] run complete, sleeping 3600s';
        sleep 3600;
      done"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-proj07_user}:${POSTGRES_PASSWORD}@postgres:5432/proj07_sql_db
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
    volumes:
      - /mnt/block:/mnt/block
    networks:
      - recap-net
    profiles:
      - monitoring  # docker compose --profile monitoring up -d online-eval

  # ═══════════════════════════════════════════════════════════════════════════
  # 6. MONITORING — Prometheus + Grafana + Alertmanager + Node Exporter
  # ═══════════════════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: jitsi-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./serving/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./serving/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    depends_on:
      - serving-api
    networks:
      - recap-net

  grafana:
    image: grafana/grafana:10.3.3
    container_name: jitsi-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/jitsi-serving.json
    volumes:
      - ./serving/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./serving/monitoring/grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - recap-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: jitsi-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./serving/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - recap-net

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: jitsi-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - recap-net

