###############################################################################
# Jitsi Topic Segmentation & Recap — Full System Docker Compose
#
# Usage:
#   cp .env.example .env        # fill in secrets + floating IP
#   docker compose up -d        # brings up everything
#   docker compose logs -f      # watch logs
#
# Services are grouped:
#   1. Jitsi stack       — official images, config only
#   2. Platform          — MLflow, Postgres, MinIO (shared infra)
#   3. Data pipeline     — Aneesh's containers
#   4. Serving + UI      — Shruti's containers + Mahima's recap UI
#   5. Training/MLOps    — Mahima's containers
#   6. Monitoring        — Prometheus + Grafana
###############################################################################

volumes:
  postgres_data:          # Shared Postgres persistent data
  minio_data:             # MLflow artifact store
  jitsi_web_config:
  jitsi_jvb_config:
  jitsi_prosody_config:
  jitsi_jicofo_config:
  jigasi_config:
  prometheus_data:
  grafana_data:

networks:
  recap-net:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# Environment variables loaded from .env file (see .env.example)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # 1. JITSI STACK — official images
  # ═══════════════════════════════════════════════════════════════════════════

  jitsi-web:
    image: jitsi/web:stable-9823
    restart: unless-stopped
    ports:
      - "${JITSI_PORT:-8443}:443"
      - "8080:80"
    environment:
      - ENABLE_GUESTS=1
      - ENABLE_TRANSCRIPTIONS=1
      - PUBLIC_URL=https://${FLOATING_IP}:${JITSI_PORT:-8443}
      - TZ=UTC
    volumes:
      - jitsi_web_config:/config
      - ./jitsi/custom-config.js:/config/custom-config.js:ro
    networks:
      - recap-net

  jitsi-prosody:
    image: jitsi/prosody:stable-9823
    restart: unless-stopped
    environment:
      - ENABLE_GUESTS=1
      - PUBLIC_URL=https://${FLOATING_IP}:${JITSI_PORT:-8443}
      - TZ=UTC
    volumes:
      - jitsi_prosody_config:/config
    networks:
      - recap-net

  jitsi-jicofo:
    image: jitsi/jicofo:stable-9823
    restart: unless-stopped
    environment:
      - TZ=UTC
    volumes:
      - jitsi_jicofo_config:/config
    networks:
      - recap-net

  jitsi-jvb:
    image: jitsi/jvb:stable-9823
    restart: unless-stopped
    ports:
      - "${JVB_PORT:-10000}:10000/udp"
    environment:
      - JVB_ADVERTISE_IPS=${FLOATING_IP}
      - JVB_PORT=${JVB_PORT:-10000}
      - TZ=UTC
    volumes:
      - jitsi_jvb_config:/config
    networks:
      - recap-net

  jigasi:
    image: jitsi/jigasi:stable-9823
    restart: unless-stopped
    environment:
      - ENABLE_TRANSCRIPTIONS=1
      - TZ=UTC
    volumes:
      - jigasi_config:/config
    networks:
      - recap-net

  # ═══════════════════════════════════════════════════════════════════════════
  # 2. PLATFORM — shared infrastructure (single instance, everyone uses)
  # ═══════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: recap_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./platform/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recap -d recap_system"]
      interval: 10s
      retries: 5
    networks:
      - recap-net

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      retries: 3
    networks:
      - recap-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
    - "pip install psycopg2-binary -q && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://${POSTGRES_USER:-recap}:${POSTGRES_PASSWORD}@postgres:5432/recap_system --default-artifact-root s3://mlflow-artifacts/"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    networks:
      - recap-net

  # ═══════════════════════════════════════════════════════════════════════════
  # 3. DATA PIPELINE — Aneesh's containers
  # ═══════════════════════════════════════════════════════════════════════════

  data-pipeline:
    build: ./data-pipeline
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-recap}:${POSTGRES_PASSWORD}@postgres:5432/recap_system
      MINIO_ENDPOINT: http://minio:9000
      MINIO_USER: ${MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
    networks:
      - recap-net

  data-generator:
    build: ./data-pipeline
    command: python data_generator.py
    restart: unless-stopped
    depends_on:
      - serving-api
      - postgres
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-recap}:${POSTGRES_PASSWORD}@postgres:5432/recap_system
      SERVING_API_URL: http://serving-api:8000
    networks:
      - recap-net
    profiles:
      - emulated-traffic   # only runs during ongoing operation: docker compose --profile emulated-traffic up

  batch-pipeline:
    build: ./data-pipeline
    command: python batch_compile.py
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-recap}:${POSTGRES_PASSWORD}@postgres:5432/recap_system
      MINIO_ENDPOINT: http://minio:9000
      MINIO_USER: ${MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      OUTPUT_BUCKET: training-datasets
    networks:
      - recap-net
    profiles:
      - retrain    # only runs when triggered: docker compose --profile retrain run batch-pipeline

  # ═══════════════════════════════════════════════════════════════════════════
  # 4. SERVING + UI — Shruti's API + Mahima's Recap UI
  # ═══════════════════════════════════════════════════════════════════════════

  serving-api:
    build: ./serving
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-recap}:${POSTGRES_PASSWORD}@postgres:5432/recap_system
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: jitsi-topic-segmenter
      MODEL_ALIAS: production
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    networks:
      - recap-net

  recap-ui:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./recap-ui/index.html:/usr/share/nginx/html/index.html:ro
      - ./recap-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8085:80"
    depends_on:
      - serving-api
    networks:
      - recap-net

  # ═══════════════════════════════════════════════════════════════════════════
  # 5. TRAINING / MLOPS — Mahima's containers
  # ═══════════════════════════════════════════════════════════════════════════

  retrain-watcher:
    build: ./train
    command: python retrain_watcher.py
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-recap}:${POSTGRES_PASSWORD}@postgres:5432/recap_system
      RETRAIN_THRESHOLD: ${RETRAIN_THRESHOLD:-5}    # low for demo, 500 for production
      RETRAIN_CHECK_INTERVAL_SECONDS: 300
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    networks:
      - recap-net

  retrain-job:
    build: ./train
    command: python retrain.py
    shm_size: '10gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-recap}:${POSTGRES_PASSWORD}@postgres:5432/recap_system
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MINIO_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MODEL_NAME: jitsi-topic-segmenter
      TRAINING_DATA_BUCKET: training-datasets
    networks:
      - recap-net
    profiles:
      - retrain    # triggered by retrain-watcher or manually: docker compose --profile retrain run retrain-job

  # ═══════════════════════════════════════════════════════════════════════════
  # 6. MONITORING — Prometheus + Grafana
  # ═══════════════════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - recap-net

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - recap-net
